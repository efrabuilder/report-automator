<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Automator — Efraín Rojas Artavia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root { --c1:#FF6B35; --dark:#0D0D0D; --card:#141414; --border:rgba(255,255,255,0.08); --text:#F0EEE8; --muted:#888; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:14px; line-height:1.6; }
  nav { background:rgba(13,13,13,0.95); border-bottom:1px solid var(--border); padding:14px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .logo { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
  .logo span { color:var(--c1); }
  .back { color:var(--muted); text-decoration:none; font-size:13px; transition:color .2s; }
  .back:hover { color:var(--text); }
  .hero { padding:48px 32px 32px; max-width:1100px; margin:0 auto; }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(28px,4vw,42px); font-weight:800; letter-spacing:-1px; margin-bottom:8px; }
  h1 span { color:var(--c1); }
  .subtitle { color:var(--muted); font-size:15px; margin-bottom:32px; }
  .wrap { max-width:1100px; margin:0 auto; padding:0 32px 48px; }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; }
  .panel-title { font-weight:600; font-size:15px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .panel-title span { font-size:18px; }
  textarea {
    width:100%; height:200px; background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'Space Grotesk',sans-serif;
    font-size:12px; padding:12px; resize:vertical; outline:none;
    transition:border-color .2s;
  }
  textarea:focus { border-color:rgba(255,107,53,0.5); }
  .btn-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  button { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; transition:all .2s; }
  .btn-primary { background:var(--c1); color:#fff; }
  .btn-primary:hover { background:#ff4d1a; }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .btn-secondary { background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }
  .btn-secondary:hover { color:var(--text); }
  .btn-green { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.25); }
  .btn-green:hover { background:rgba(16,185,129,0.25); }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
  .stat-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .stat-col { font-weight:600; font-size:13px; color:var(--c1); margin-bottom:8px; }
  .stat-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px; }
  .stat-row span:first-child { color:var(--muted); }
  .stat-row span:last-child { font-weight:500; }

  /* Charts */
  .charts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; }
  .chart-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .chart-title { font-size:13px; font-weight:600; margin-bottom:12px; color:var(--muted); }
  .chart-card img { width:100%; border-radius:8px; }

  /* Table */
  .table-wrap { overflow-x:auto; margin-top:4px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { background:rgba(255,107,53,0.1); color:var(--c1); padding:8px 12px; text-align:left; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--muted); }
  tr:hover td { background:rgba(255,255,255,0.02); color:var(--text); }

  .empty { text-align:center; color:var(--muted); padding:40px 20px; font-size:13px; }
  .loading { text-align:center; color:var(--c1); padding:30px; font-size:13px; }
  .hidden { display:none; }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
</style>
</head>
<body>

<nav>
  <div class="logo">report<span>.</span>automator</div>
  <a class="back" href="https://efrabuilder.github.io">← Back to portfolio</a>
</nav>

<div class="hero">
  <h1>📊 Report <span>Automator</span></h1>
  <p class="subtitle">Paste CSV or Excel data to automatically generate charts, statistics and a downloadable Excel report.</p>
</div>

<div class="wrap">
  <!-- Input -->
  <div class="panel">
    <div class="panel-title"><span>📋</span> CSV Data Input</div>
    <textarea id="csvInput" placeholder="Paste your CSV data here...
Example:
Month,Region,Revenue,Expenses
Jan,North,45200,31000
Jan,South,28400,18500
Feb,North,51200,34200"></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="analyzeBtn" onclick="analyze()">⚡ Generate Report</button>
      <button class="btn-secondary" onclick="loadSample()">Load Sample Data</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
      <button class="btn-green" id="exportBtn" onclick="exportExcel()" style="display:none;">⬇ Export Excel</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="hidden">
    <!-- Stats -->
    <div class="panel">
      <div class="panel-title"><span>📈</span> Statistics</div>
      <div id="statsGrid" class="stats-grid"></div>
    </div>

    <!-- Charts -->
    <div class="panel">
      <div class="panel-title"><span>🎨</span> Charts</div>
      <div id="chartsGrid" class="charts-grid"></div>
    </div>

    <!-- Preview -->
    <div class="panel">
      <div class="panel-title"><span>🗃️</span> Data Preview</div>
      <div class="table-wrap">
        <table id="previewTable"></table>
      </div>
    </div>
  </div>

  <div id="loading" class="hidden loading">⚡ Generating report...</div>
  <div id="empty" class="panel empty">Paste CSV data and click Generate Report to see results.</div>
</div>

<script>
let currentCsv = '';

async function analyze() {
  const csv = document.getElementById('csvInput').value.trim();
  if (!csv) { alert('Please paste CSV data first.'); return; }
  currentCsv = csv;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = 'Generating...';
  document.getElementById('empty').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ csv })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    renderResults(data);
  } catch(e) {
    alert('Error generating report. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = '⚡ Generate Report';
    document.getElementById('loading').classList.add('hidden');
  }
}

function renderResults(data) {
  // Stats
  const statsGrid = document.getElementById('statsGrid');
  statsGrid.innerHTML = '';
  for (const [col, s] of Object.entries(data.stats)) {
    statsGrid.innerHTML += `
      <div class="stat-card">
        <div class="stat-col">${col}</div>
        <div class="stat-row"><span>Sum</span><span>${s.sum.toLocaleString()}</span></div>
        <div class="stat-row"><span>Avg</span><span>${s.mean.toLocaleString()}</span></div>
        <div class="stat-row"><span>Max</span><span>${s.max.toLocaleString()}</span></div>
        <div class="stat-row"><span>Min</span><span>${s.min.toLocaleString()}</span></div>
      </div>`;
  }

  // Charts
  const chartsGrid = document.getElementById('chartsGrid');
  chartsGrid.innerHTML = '';
  data.charts.forEach(c => {
    if (c.error) {
      chartsGrid.innerHTML += `<div class="chart-card"><div class="chart-title">${c.title}</div><div class="empty" style="padding:20px">Could not generate: ${c.error}</div></div>`;
    } else {
      chartsGrid.innerHTML += `<div class="chart-card"><div class="chart-title">${c.title}</div><img src="data:image/png;base64,${c.image}" alt="${c.title}"></div>`;
    }
  });

  // Preview table
  const table = document.getElementById('previewTable');
  if (data.preview.length > 0) {
    const cols = Object.keys(data.preview[0]);
    table.innerHTML = `<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    data.preview.forEach(row => {
      table.innerHTML += `<tr>${cols.map(c=>`<td>${row[c] ?? ''}</td>`).join('')}</tr>`;
    });
  }

  document.getElementById('results').classList.remove('hidden');
  document.getElementById('exportBtn').style.display = 'inline-block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

async function exportExcel() {
  const res = await fetch('/api/export', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ csv: currentCsv })
  });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'report.xlsx'; a.click();
  URL.revokeObjectURL(url);
}

async function loadSample() {
  const res = await fetch('/api/sample');
  const data = await res.json();
  document.getElementById('csvInput').value = data.csv;
}

function clearAll() {
  document.getElementById('csvInput').value = '';
  document.getElementById('results').classList.add('hidden');
  document.getElementById('exportBtn').style.display = 'none';
  document.getElementById('empty').classList.remove('hidden');
  currentCsv = '';
}
</script>
</body>
</html>
